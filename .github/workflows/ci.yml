name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bash build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*/plaud-mcp*
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create release archives
        run: |
          cd dist
          tar czf plaud-mcp-${{ github.ref_name }}.tar.gz */plaud-mcp*
          zip -r plaud-mcp-${{ github.ref_name }}.zip */plaud-mcp*

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/plaud-mcp-${{ github.ref_name }}.tar.gz
            dist/plaud-mcp-${{ github.ref_name }}.zip

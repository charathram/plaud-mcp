name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release using the version in package.json"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bash build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*/plaud-mcp*
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create release archives
        run: |
          cd dist
          tar czf plaud-mcp-${{ steps.version.outputs.tag }}.tar.gz */plaud-mcp*
          zip -r plaud-mcp-${{ steps.version.outputs.tag }}.zip */plaud-mcp*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/plaud-mcp-${{ steps.version.outputs.tag }}.tar.gz
            dist/plaud-mcp-${{ steps.version.outputs.tag }}.zip
